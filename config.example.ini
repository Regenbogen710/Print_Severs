# 服务配置
[server]
host = 0.0.0.0
port = 8000
worker_enabled = true

# 打印机配置
[printer]
printer_name = Lenovo LJ2205
dry_run = false

# 可选配置：Windows 下建议配置 SumatraPDF，提高 PDF 打印可靠性。
# 示例：C:\Program Files\SumatraPDF\SumatraPDF.exe
sumatra_pdf_path =

# 可选配置：用于打印 doc/docx/rtf/txt 文件。
# 示例：C:\Program Files\LibreOffice\program\soffice.exe
libreoffice_path =

# 存储与上传限制
[storage]
data_dir = data
max_upload_mb = 50
allowed_extensions = .pdf,.png,.jpg,.jpeg,.bmp,.gif,.tif,.tiff,.doc,.docx,.rtf,.txt

# 访问控制
# 默认模式只允许本机地址和局域网地址访问。
[access]
public_access_enabled = false
public_ip_whitelist =
trust_proxy_headers = false
trusted_proxy_ips =

# 认证配置
[auth]
admin_username = admin
admin_password = change-this-password
require_auth_for_upload = false

# 打印执行配置
[print]
print_command_timeout_seconds = 90
worker_poll_seconds = 2
